version: "3.9"
services:
  letmecook:
    depends_on:
      - postgres_db
    build:
      context: ./letmecook
      dockerfile: Dockerfile
    image: letmecook:v0.0.1
    env_file:
      - letmecook/.env
    ports:
      - "8000:8000"
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    container_name: letmecook_service
    volumes:
      - .:/letmecook
  postgres_db:
    image: postgres
    restart: always
    command: -p 5434
    env_file:
      - letmecook/.env
    expose:
      - 5434
    ports:
      - "5434:5434"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
  # redis_db:
  #   image: redis
  #   restart: always
  #   expose:
  #     - 6388
  #   ports:
  #     - "6388:6388"
  #   volumes:
  #     - redis_data:/data
  #   entrypoint: redis-server --appendonly yes --port 6379

volumes:
  postgres_data:
